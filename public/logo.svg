<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" stroke="#1a2e22" stroke-width="3" fill="none"/>
  <circle cx="100" cy="100" r="80" stroke="#243a2d" stroke-width="1.5" fill="#080c0a"/>

  <!-- Crosshair lines -->
  <line x1="100" y1="24" x2="100" y2="72" stroke="#1a2e22" stroke-width="1.5"/>
  <line x1="100" y1="128" x2="100" y2="176" stroke="#1a2e22" stroke-width="1.5"/>
  <line x1="24" y1="100" x2="72" y2="100" stroke="#1a2e22" stroke-width="1.5"/>
  <line x1="128" y1="100" x2="176" y2="100" stroke="#1a2e22" stroke-width="1.5"/>

  <!-- Corner tick marks -->
  <line x1="38" y1="38" x2="50" y2="50" stroke="#243a2d" stroke-width="1"/>
  <line x1="162" y1="38" x2="150" y2="50" stroke="#243a2d" stroke-width="1"/>
  <line x1="38" y1="162" x2="50" y2="150" stroke="#243a2d" stroke-width="1"/>
  <line x1="162" y1="162" x2="150" y2="150" stroke="#243a2d" stroke-width="1"/>

  <!-- Center X mark (extraction symbol) -->
  <path d="M78 78 L96 96" stroke="#00e676" stroke-width="4" stroke-linecap="round"/>
  <path d="M122 78 L104 96" stroke="#00e676" stroke-width="4" stroke-linecap="round"/>
  <path d="M100 100 L100 130" stroke="#00e676" stroke-width="4" stroke-linecap="round"/>
  <path d="M88 120 L100 130 L112 120" stroke="#00e676" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Accent glow dot -->
  <circle cx="100" cy="100" r="4" fill="#00e676" opacity="0.3"/>
  <circle cx="100" cy="100" r="2" fill="#00e676"/>
</svg>
